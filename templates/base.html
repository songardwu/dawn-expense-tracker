<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="theme-color" content="#F5F2ED" media="(prefers-color-scheme: light)">
    <meta name="theme-color" content="#1E1A17" media="(prefers-color-scheme: dark)">
    <meta name="color-scheme" content="light dark">
    <title>出帳管理</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC&family=Noto+Serif+TC:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    {% if user %}
    <nav class="navbar">
        <a href="/" class="nav-brand">Dawn</a>
        <div class="nav-right">
            <span class="nav-user">{{ user.display_name }}</span>
            <a href="/projects" class="nav-link">案場管理</a>
            <a href="/vendors" class="nav-link">廠商資料</a>
            {% if user.role == 'admin' %}
            <a href="/users" class="nav-link">帳號管理</a>
            {% endif %}
            <a href="/logout" class="nav-link">登出</a>
        </div>
    </nav>
    {% endif %}
    <div class="container">
        {% block content %}{% endblock %}
    </div>
</body>
</html>

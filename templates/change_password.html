{% extends "base.html" %}
{% block title %}修改密碼{% endblock %}
{% block content %}
<a href="/" class="back-link">&larr; 返回</a>
<h1>修改密碼</h1>

<div class="bento-grid">
<div class="bento-cell bento-cell--full">

{% if error %}
<div class="error-msg">{{ error }}</div>
{% endif %}
{% if success %}
<div class="import-result">{{ success }}</div>
{% endif %}

<form method="POST" action="/change-password" class="report-form" style="max-width:400px;">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <div class="form-group">
        <label for="old_password">目前密碼 <span class="required">*</span></label>
        <input type="password" id="old_password" name="old_password" required autocomplete="current-password">
    </div>
    <div class="form-group">
        <label for="new_password">新密碼 <span class="required">*</span></label>
        <input type="password" id="new_password" name="new_password" required minlength="6" autocomplete="new-password">
        <div class="field-hint">至少 6 字元</div>
    </div>
    <div class="form-group">
        <label for="confirm_password">確認新密碼 <span class="required">*</span></label>
        <input type="password" id="confirm_password" name="confirm_password" required minlength="6" autocomplete="new-password">
    </div>
    <button type="submit" class="btn btn-primary btn-submit">更新密碼</button>
</form>

</div>
</div>
{% endblock %}

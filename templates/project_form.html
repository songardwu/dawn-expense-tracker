{% extends "base.html" %}
{% block content %}
<h1>{{ '編輯案場' if project else '新增案場' }}</h1>

<div class="bento-grid">
<div class="bento-cell bento-cell--full">
<form method="POST" action="{{ '/projects/%d/update' % project.id if project else '/projects/create' }}">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

    <div class="form-grid">
        <div class="form-group">
            <label>案名 <span class="required">*</span></label>
            <input type="text" name="case_name" value="{{ project.case_name if project else '' }}" required>
        </div>

        {% if project %}
        <div class="form-group">
            <label>案場編號</label>
            <input type="text" value="{{ project.case_id }}" disabled>
        </div>
        {% endif %}

        {% if user.role == 'admin' and designers %}
        <div class="form-group">
            <label>負責設計師</label>
            <select name="designer_id">
                {% for d in designers %}
                <option value="{{ d[0] }}" {{ 'selected' if project and project.designer_id == d[0] else '' }}>
                    {{ d[1] }}
                </option>
                {% endfor %}
            </select>
        </div>
        {% endif %}

        <div class="form-group">
            <label>業主姓名</label>
            <input type="text" name="owner_name" value="{{ project.owner_name if project else '' }}">
        </div>

        <div class="form-group">
            <label>業主電話</label>
            <input type="tel" name="owner_phone" value="{{ project.owner_phone if project else '' }}">
        </div>

        <div class="form-group" style="grid-column: 1 / -1;">
            <label>業主地址</label>
            <input type="text" name="owner_address" value="{{ project.owner_address if project else '' }}">
        </div>

        <div class="form-group">
            <label>簽約日期</label>
            <input type="date" name="contract_date"
                   value="{{ project.contract_date.isoformat() if project and project.contract_date else '' }}">
        </div>

        <div class="form-group">
            <label>施工開始日</label>
            <input type="date" name="construction_start"
                   value="{{ project.construction_start.isoformat() if project and project.construction_start else '' }}">
        </div>

        <div class="form-group">
            <label>施工結束日</label>
            <input type="date" name="construction_end"
                   value="{{ project.construction_end.isoformat() if project and project.construction_end else '' }}">
        </div>
    </div>

    <div class="form-actions">
        <button type="submit" class="btn btn-primary">{{ '儲存' if project else '建立案場' }}</button>
        <a href="{{ '/projects/%d' % project.id if project else '/projects' }}" class="btn btn-secondary">取消</a>
    </div>
</form>
</div>
</div>
{% endblock %}

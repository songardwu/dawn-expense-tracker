{% extends "base.html" %}
{% block content %}
<a href="/" class="back-link">&larr; 返回</a>
<h1>帳號管理</h1>

<div class="section-card">
    <h2>新增帳號</h2>
    <form method="POST" action="/users/create" class="user-form">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <div class="form-row">
            <div class="form-group">
                <label for="username">帳號（英文）</label>
                <input type="text" id="username" name="username" required placeholder="designer_a">
            </div>
            <div class="form-group">
                <label for="display_name">姓名</label>
                <input type="text" id="display_name" name="display_name" required placeholder="設計師 A">
            </div>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label for="password">預設密碼</label>
                <input type="password" id="password" name="password" required>
            </div>
            <div class="form-group">
                <label for="role">角色</label>
                <select id="role" name="role">
                    <option value="designer">設計師</option>
                    <option value="admin">管理員</option>
                </select>
            </div>
        </div>
        <button type="submit" class="btn btn-primary">新增帳號</button>
    </form>
</div>

<div class="section-card">
    <h2>帳號清單</h2>
    <table class="user-table">
        <thead>
            <tr>
                <th>帳號</th>
                <th>姓名</th>
                <th>角色</th>
                <th>狀態</th>
                <th>操作</th>
            </tr>
        </thead>
        <tbody>
            {% for u in users %}
            <tr class="{{ 'row-disabled' if not u[4] else '' }}">
                <td>{{ u[1] }}</td>
                <td>{{ u[2] }}</td>
                <td>{{ '管理員' if u[3] == 'admin' else '設計師' }}</td>
                <td>
                    {% if u[4] %}
                    <span class="status-badge status-active">啟用</span>
                    {% else %}
                    <span class="status-badge status-disabled">停用</span>
                    {% endif %}
                </td>
                <td class="actions-cell">
                    {% if u[0] != user.id %}
                    <form method="POST" action="/users/{{ u[0] }}/toggle" class="inline-form">
                        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                        <button type="submit" class="btn-small {{ 'btn-danger' if u[4] else 'btn-success' }}">
                            {{ '停用' if u[4] else '啟用' }}
                        </button>
                    </form>
                    <form method="POST" action="/users/{{ u[0] }}/reset-password" class="inline-form">
                        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                        <input type="password" name="new_password" placeholder="新密碼" class="small-input" required>
                        <button type="submit" class="btn-small btn-outline">重設</button>
                    </form>
                    {% else %}
                    <span class="text-muted">（自己）</span>
                    {% endif %}
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
